<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GoPad</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* Sharp corners everywhere — no rounding on any component */
*,*::before,*::after{border-radius:0!important}

/* ── Ink & Brass identity ──────────────────────────────────────────────────
   Deep ink ground, brass-amber accent (archival permanence / phosphor),
   and a durability "heartbeat" in the status bar — the crash-proof promise,
   made visible. Light mode is a warm "paper" theme.                          */
:root{
  --bg:#0f1419;
  --bg-side:#121a21;
  --bg-bar:#141c24;
  --surface:#1a242d;
  --hover:#1c2832;
  --sel:#2a3a47;
  --border:#202b35;
  --text:#c2ccd4;
  --text-dim:#6b7a86;
  --text-bright:#eef3f6;
  --accent:#f2b347;
  --accent-2:#ffcd6b;
  --accent-soft:rgba(242,179,71,.12);
  --ok:#4cc38a;
  --danger:#e5573f;
  --ln:#3a4a56;
  --scroll:#28353f;
  --caret:#f2b347;

  --font-mono:'JetBrains Mono','Cascadia Code','Fira Code',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  --font-ui:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --fs:14px;
  --lh:1.7;
  --sidebar:248px;
}
[data-theme=light]{
  --bg:#f3efe4;
  --bg-side:#ece7d9;
  --bg-bar:#e7e1d1;
  --surface:#fbf8f0;
  --hover:#e2dccb;
  --sel:#e8dcc0;
  --border:#d8d1bf;
  --text:#3a3a32;
  --text-dim:#8a8474;
  --text-bright:#1f1d16;
  --accent:#b5791b;
  --accent-2:#9c6614;
  --accent-soft:rgba(181,121,27,.14);
  --ok:#3f9c6d;
  --danger:#c0432a;
  --ln:#bcb3a0;
  --scroll:#cfc7b4;
  --caret:#b5791b;
}

html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font-ui);font-size:13px;user-select:none;
  -webkit-font-smoothing:antialiased;
}

::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:5px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim);background-clip:padding-box}

#app{display:flex;flex-direction:column;height:100vh}

/* ── Menu bar ─────────────────────────────────────────────────────────────*/
#header{
  background:var(--bg-bar);border-bottom:1px solid var(--border);
  height:34px;display:flex;align-items:stretch;padding:0 6px;flex-shrink:0;
  position:relative;                 /* anchor for the centered quick-box */
  -webkit-user-select:none;user-select:none;
  --wails-draggable:drag;            /* the bar itself drags the window */
}
/* Interactive groups opt out of dragging (custom prop inherits, so set on each) */
.sb-toggle,.menubar,.qbar,.win-ctrls{--wails-draggable:no-drag}

/* ── File-based icons (Tabler set, via CSS mask so they inherit currentColor) */
.ic{
  display:inline-block;width:15px;height:15px;flex-shrink:0;
  background-color:currentColor;
  -webkit-mask:var(--i) no-repeat center/contain;
          mask:var(--i) no-repeat center/contain;
}
.win-btn .ic{width:14px;height:14px}
.sb-toggle .ic{width:18px;height:18px}
.icon-btn .ic{width:16px;height:16px}

/* ── Custom window controls ───────────────────────────────────────────────*/
/* Quick-access bar (right side of the header) */
.qbar{display:flex;align-items:center;gap:2px;margin-left:auto;padding-right:8px}
.theme-btn{
  background:none;border:none;cursor:pointer;width:26px;height:26px;padding:3px;
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);
  transition:color .14s,transform .1s;
}
.theme-btn:hover{color:var(--accent)}
.theme-btn:active{transform:scale(.9)}
.theme-btn svg{width:100%;height:100%;display:block}
.theme-btn .tb-halves,.theme-btn .tb-ring{
  transform-box:view-box;transform-origin:center;transition:transform .4s ease-in-out;
}
.theme-btn .tb-shadow{fill:var(--bg-bar)}
.theme-btn.is-dark .tb-halves{transform:rotate(-180deg)}
.theme-btn.is-dark .tb-ring{transform:rotate(180deg)}

.win-ctrls{display:flex;align-items:center;gap:1px}
.win-btn{
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  width:30px;height:25px;border-radius:7px;margin:4px 0;
  display:flex;align-items:center;justify-content:center;
  transition:background .13s,color .13s;
}
.win-btn:hover{background:var(--hover);color:var(--text-bright)}
.win-btn.close:hover{background:var(--danger);color:#fff}
.win-btn svg{width:13px;height:13px}
.sb-toggle{
  position:relative;background:none;border:none;color:var(--text-dim);cursor:pointer;
  width:30px;height:26px;border-radius:7px;margin:4px 6px 4px 0;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .13s,color .13s;
}
.sb-toggle:hover{background:var(--hover);color:var(--accent)}
.sb-toggle.collapsed{color:var(--accent)}   /* lit when the sidebar is hidden */
.sb-toggle::after{
  content:attr(data-tip);position:absolute;top:calc(100% + 8px);left:0;
  transform:translateY(-5px);white-space:nowrap;background:var(--surface);
  color:var(--text-bright);border:1px solid var(--border);font-family:var(--font-ui);
  font-size:11px;font-weight:500;padding:4px 9px;border-radius:7px;
  box-shadow:0 8px 22px rgba(0,0,0,.4);opacity:0;pointer-events:none;
  transition:opacity .15s,transform .15s;z-index:1200;
}
.sb-toggle:hover::after{opacity:1;transform:translateY(0)}

.menubar{display:flex;align-items:stretch}
.menu{position:relative;display:flex;align-items:stretch}
.menu-btn{
  background:none;border:none;color:var(--text);cursor:pointer;
  padding:0 12px;font-family:var(--font-ui);font-size:12.5px;
  display:flex;align-items:center;border-radius:6px;margin:4px 1px;
  transition:background .12s,color .12s;
}
.menu-btn:hover{background:var(--hover)}
.menu.open>.menu-btn{background:var(--accent-soft);color:var(--accent)}

.menu-pop{
  position:absolute;top:calc(100% + 2px);left:0;min-width:210px;z-index:1100;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:5px;box-shadow:0 14px 40px rgba(0,0,0,.45);
  display:none;flex-direction:column;
  animation:menupop .12s ease;
}
.menu.open>.menu-pop{display:flex}
@keyframes menupop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.menu-item{
  background:none;border:none;color:var(--text);cursor:pointer;text-align:left;
  font-family:var(--font-ui);font-size:12.5px;padding:7px 10px;border-radius:7px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  transition:background .1s,color .1s;
}
.menu-item:hover{background:var(--accent-soft);color:var(--accent)}
.menu-item.danger:hover{background:rgba(229,87,63,.13);color:var(--danger)}
.menu-item .menu-key{font-family:var(--font-mono);font-size:10.5px;color:var(--text-dim)}
.menu-item:hover .menu-key{color:inherit;opacity:.8}
.menu-div{height:1px;background:var(--border);margin:5px 6px}

/* ── Main split ───────────────────────────────────────────────────────────*/
#main{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ──────────────────────────────────────────────────────────────*/
#sidebar{
  width:var(--sidebar);background:var(--bg-side);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:width .26s cubic-bezier(.4,0,.2,1),border-right-color .26s;
}
#sidebar.collapsed{width:0;border-right-color:transparent}
/* Children keep their full width while the rail animates, so text never
   reflows mid-collapse — it slides out cleanly behind overflow:hidden. */
#sb-head,#sb-search{width:var(--sidebar);flex-shrink:0}
#notes-list{width:var(--sidebar);flex-shrink:0}
#sb-head{
  padding:13px 14px 9px;display:flex;align-items:center;justify-content:space-between;
}
.sb-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;
  color:var(--text-dim);
}
.sb-count{
  font-family:var(--font-mono);font-size:10px;color:var(--text-dim);
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:1px 7px;margin-left:7px;
}

.icon-btn{
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  transition:background .14s,color .14s,transform .1s;
}
.icon-btn:hover{background:var(--hover);color:var(--accent)}
.icon-btn:active{transform:scale(.92)}
.icon-btn svg{width:16px;height:16px}

#sb-search{padding:0 12px 10px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap .ic{
  position:absolute;left:9px;width:14px;height:14px;color:var(--text-dim);pointer-events:none;
}
#search-inp{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px 9px 7px 28px;color:var(--text);font-size:12px;
  outline:none;transition:border-color .15s,box-shadow .15s;user-select:text;
  font-family:var(--font-ui);
}
#search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
#search-inp::placeholder{color:var(--text-dim)}

#notes-list{flex:1;overflow-y:auto;padding:2px 8px 10px}

.ni{
  position:relative;padding:9px 11px 9px 13px;cursor:pointer;border-radius:8px;
  display:flex;align-items:center;gap:8px;margin-bottom:2px;
  transition:background .12s;
}
.ni::before{
  content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);
  width:3px;height:0;background:var(--accent);border-radius:2px;
  transition:height .16s ease;
}
.ni:hover{background:var(--hover)}
.ni:hover::before{height:14px}
.ni.active{background:var(--surface)}
.ni.active::before{height:22px}
.ni-info{flex:1;min-width:0}
.ni-title{
  font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-weight:500;
}
.ni.active .ni-title{color:var(--text-bright)}
.ni-date{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-top:2px}
.ni-del{
  opacity:0;background:none;border:none;color:var(--text-dim);cursor:pointer;
  width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,color .15s,background .15s;flex-shrink:0;
}
.ni:hover .ni-del{opacity:1}
.ni-del:hover{color:var(--danger);background:rgba(229,87,63,.12)}
.ni-del .ic{width:14px;height:14px}
.sb-empty{padding:18px 10px;color:var(--text-dim);font-size:12px;text-align:center;line-height:1.6}

/* ── Editor area ──────────────────────────────────────────────────────────*/
#editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

#toolbar{
  background:var(--bg-bar);border-bottom:1px solid var(--border);
  padding:7px 12px;display:flex;align-items:center;gap:3px;flex-shrink:0;
}
#note-title{
  background:none;border:none;color:var(--text-bright);
  font-family:var(--font-ui);font-size:14px;font-weight:600;
  padding:5px 8px;border-radius:7px;flex:1;min-width:0;outline:none;
  border:1px solid transparent;transition:border-color .15s,background .15s;user-select:text;
}
#note-title:focus{border-color:var(--accent);background:var(--accent-soft)}
#note-title::placeholder{color:var(--text-dim);font-weight:500}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 5px;flex-shrink:0}
.tb-btn{
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  padding:6px 9px;border-radius:7px;font-size:11.5px;font-weight:500;white-space:nowrap;
  display:flex;align-items:center;gap:5px;transition:background .12s,color .12s,transform .1s;flex-shrink:0;
}
.tb-btn:hover{background:var(--hover);color:var(--text-bright)}
.tb-btn:active{transform:scale(.95)}
.tb-btn svg{width:14px;height:14px}
.tb-btn.danger:hover{background:rgba(229,87,63,.12);color:var(--danger)}
.tb-btn.active{color:var(--accent);background:var(--accent-soft)}
.tb-mono{font-family:var(--font-mono);font-weight:600}

/* ── Editor / empty ───────────────────────────────────────────────────────*/
#editor-wrap{flex:1;display:flex;overflow:hidden;position:relative}

#empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;color:var(--text-dim);padding:24px;text-align:center;
}
#empty-state .es-mark{width:64px;height:64px;opacity:.5;margin-bottom:8px}
#empty-state h2{color:var(--text);font-size:16px;font-weight:600}
#empty-state p{font-size:13px;max-width:280px;line-height:1.6}
.btn-new-empty{
  margin-top:12px;background:var(--accent);color:#0f1419;border:none;border-radius:8px;
  padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;
  transition:filter .15s,transform .1s;font-family:var(--font-ui);
}
.btn-new-empty:hover{filter:brightness(1.08)}
.btn-new-empty:active{transform:scale(.96)}

#editor-pane{flex:1;display:none;overflow:hidden;position:relative}
#editor-pane.show{display:flex;animation:fadein .16s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* Smooth spring caret (native caret hidden via JS once this initialises) */
#smooth-caret{
  position:absolute;left:0;top:0;width:2px;height:16px;
  background:var(--accent);pointer-events:none;z-index:6;display:none;
  will-change:transform;
}
#smooth-caret.blink{animation:caret-blink 1.05s steps(1,end) infinite}
@keyframes caret-blink{0%,55%{opacity:1}55.01%,100%{opacity:0}}

#line-numbers{
  background:var(--bg);color:var(--ln);
  font-family:var(--font-mono);font-size:var(--fs);line-height:var(--lh);
  padding:16px 10px 16px 14px;text-align:right;user-select:none;
  overflow:hidden;min-width:52px;white-space:pre;flex-shrink:0;
  border-right:1px solid var(--border);
}
#editor{
  flex:1;background:var(--bg);color:var(--text);resize:none;border:none;outline:none;
  font-family:var(--font-mono);font-size:var(--fs);line-height:var(--lh);
  padding:16px 20px;tab-size:4;overflow:auto;user-select:text;caret-color:var(--caret);
  white-space:pre-wrap;word-wrap:break-word;
}
#editor::selection{background:var(--sel)}

/* ── Find bar ─────────────────────────────────────────────────────────────*/
#find-bar{
  background:var(--bg-bar);border-top:1px solid var(--border);
  padding:8px 12px;display:none;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;
}
#find-bar.show{display:flex}
.fi-label{color:var(--text-dim);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.fi{
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:5px 9px;color:var(--text);font-size:12px;outline:none;user-select:text;
  font-family:var(--font-mono);transition:border-color .15s,box-shadow .15s;
}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.fi::placeholder{color:var(--text-dim);font-family:var(--font-ui)}
#fi-query{width:190px}
#fi-replace{width:170px}
#fi-count{font-family:var(--font-mono);color:var(--text-dim);font-size:11px;min-width:54px;text-align:center}

/* ── Status bar + durability heartbeat (the signature) ────────────────────*/
#statusbar{
  background:var(--bg-bar);border-top:1px solid var(--border);
  height:26px;display:flex;align-items:center;gap:0;padding:0 6px;
  font-family:var(--font-mono);font-size:11px;flex-shrink:0;color:var(--text-dim);
}
.st{padding:0 11px;white-space:nowrap;border-right:1px solid transparent}
.st-spacer{flex:1}

/* Heartbeat: pulses on every commit to the WAL */
#heartbeat{
  display:flex;align-items:center;gap:7px;padding:0 12px;cursor:default;
  color:var(--text);font-weight:500;
}
.hb-dot{
  width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0;
  box-shadow:0 0 0 0 var(--ok);
}
#heartbeat.writing .hb-dot{background:var(--accent);animation:breathe 1s ease-in-out infinite}
#heartbeat.failed  .hb-dot{background:var(--danger)}
#heartbeat.pulse   .hb-dot{animation:pulse .6s ease-out}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(76,195,138,.55)}
  100%{box-shadow:0 0 0 9px rgba(76,195,138,0)}
}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.35}}
.hb-label{letter-spacing:.4px}

/* ── Toast ────────────────────────────────────────────────────────────────*/
#toast{
  position:fixed;bottom:38px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--surface);color:var(--text-bright);border:1px solid var(--border);
  padding:10px 16px;border-radius:9px;font-size:12.5px;pointer-events:none;
  opacity:0;transition:opacity .18s,transform .18s;z-index:999;
  box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;align-items:center;gap:8px;
}
#toast::before{content:'';width:4px;height:14px;border-radius:2px;background:var(--accent)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Modal ────────────────────────────────────────────────────────────────*/
#modal-overlay{
  position:fixed;inset:0;background:rgba(7,10,13,.6);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:1000;
}
#modal-overlay.show{display:flex;animation:fadein .12s ease forwards}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:24px;max-width:360px;width:90%;box-shadow:0 20px 50px rgba(0,0,0,.5);
}
.modal h3{color:var(--text-bright);font-size:15px;margin-bottom:9px}
.modal p{color:var(--text-dim);font-size:12.5px;margin-bottom:20px;line-height:1.6}
.modal-acts{display:flex;gap:9px;justify-content:flex-end}
.btn{
  padding:8px 16px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;
  border:1px solid transparent;transition:background .12s,filter .12s,transform .1s;
  font-family:var(--font-ui);
}
.btn:active{transform:scale(.96)}
.btn-ghost{background:none;border-color:var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--hover)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.1)}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body data-theme="dark">
<div id="app">

  <!-- Menu bar -->
  <div id="header">
    <button class="sb-toggle" id="sb-toggle" data-tip="Toggle sidebar  (Ctrl+B)" aria-label="Toggle sidebar">
      <span class="ic" style="--i:url(assets/icons/layout-sidebar.svg)"></span>
    </button>
    <div class="menubar" id="menubar">
      <div class="menu" data-menu="file">
        <button class="menu-btn">File</button>
        <div class="menu-pop">
          <button class="menu-item" data-act="new">New note<span class="menu-key">Ctrl+N</span></button>
          <button class="menu-item" data-act="open">Open file…<span class="menu-key">Ctrl+O</span></button>
          <button class="menu-item" data-act="export">Export to file…<span class="menu-key">Ctrl+S</span></button>
          <div class="menu-div"></div>
          <button class="menu-item danger" data-act="delete">Delete note</button>
        </div>
      </div>
      <div class="menu" data-menu="edit">
        <button class="menu-btn">Edit</button>
        <div class="menu-pop">
          <button class="menu-item" data-act="undo">Undo<span class="menu-key">Ctrl+Z</span></button>
          <button class="menu-item" data-act="redo">Redo<span class="menu-key">Ctrl+Shift+Z</span></button>
          <div class="menu-div"></div>
          <button class="menu-item" data-act="find">Find &amp; replace…<span class="menu-key">Ctrl+F</span></button>
        </div>
      </div>
      <div class="menu" data-menu="view">
        <button class="menu-btn">View</button>
        <div class="menu-pop">
          <button class="menu-item" data-act="sidebar">Toggle sidebar<span class="menu-key">Ctrl+B</span></button>
          <button class="menu-item" data-act="wrap">Toggle word wrap</button>
          <div class="menu-div"></div>
          <button class="menu-item" data-act="finc">Larger text<span class="menu-key">A+</span></button>
          <button class="menu-item" data-act="fdec">Smaller text<span class="menu-key">A−</span></button>
          <div class="menu-div"></div>
          <button class="menu-item" data-act="theme">Toggle theme</button>
        </div>
      </div>
      <div class="menu" data-menu="help">
        <button class="menu-btn">Help</button>
        <div class="menu-pop">
          <button class="menu-item" data-act="shortcuts">Keyboard shortcuts</button>
          <button class="menu-item" data-act="about">About GoPad</button>
        </div>
      </div>
    </div>

    <!-- Quick-access bar -->
    <div class="qbar" id="qbar">
      <button class="theme-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">

          <path class="tb-ring" d="M120 3.75C55.5 3.75 3.75 55.5 3.75 120C3.75 184.5 55.5 236.25 120 236.25C184.5 236.25 236.25 184.5 236.25 120C236.25 55.5 184.5 3.75 120 3.75ZM120 214.5V172.5C90.75 172.5 67.5 149.25 67.5 120C67.5 90.75 90.75 67.5 120 67.5V25.5C172.5 25.5 214.5 67.5 214.5 120C214.5 172.5 172.5 214.5 120 214.5Z" fill="currentColor"/>
        </svg>

    <!-- Custom window controls -->
    <div class="win-ctrls" id="win-ctrls">

                  fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1"/>

        <input class="fi" type="text" id="fi-query" placeholder="Search…" autocomplete="off"/>

<div id="toast"></div>

<div id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Delete note</h3>
    <p id="modal-msg">This cannot be undone.</p>
    <div class="modal-acts">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-danger" id="modal-ok">Delete</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Wails bindings ──────────────────────────────────────────────────────────
// Public App methods are injected at window.go.main.App and return Promises.
const App = () => window.go.main.App;

// ── State ───────────────────────────────────────────────────────────────────
const S = {
  notes:[], activeId:null, saveTimer:null,
  fontSize:14, wordWrap:true, theme:'dark', sbCollapsed:false,
  findMatches:[], findIdx:0, confirmCb:null,
};

// ── Undo manager ────────────────────────────────────────────────────────────
const UndoMgr = {
  stack:[], idx:-1, max:100, debounceTimer:null, lastSave:0,
  save(){
    const content=ED.value, pos=ED.selectionStart, now=Date.now();
    if(this.idx>=0 && this.stack[this.idx].content===content) return;
    this.stack=this.stack.slice(0,this.idx+1);
    this.stack.push({content,pos,time:now});
    if(this.stack.length>this.max) this.stack.shift(); else this.idx++;
    this.lastSave=now;
  },
  record(){
    if(this.idx<this.stack.length-1) this.stack=this.stack.slice(0,this.idx+1);
    clearTimeout(this.debounceTimer);
    const now=Date.now();
    if(now-this.lastSave>800) this.save();
    else this.debounceTimer=setTimeout(()=>this.save(),300);
  },
  undo(){ if(this.idx<=0) return false; this.idx--; const s=this.stack[this.idx]; ED.value=s.content; ED.selectionStart=ED.selectionEnd=s.pos; return true; },
  redo(){ if(this.idx>=this.stack.length-1) return false; this.idx++; const s=this.stack[this.idx]; ED.value=s.content; ED.selectionStart=ED.selectionEnd=s.pos; return true; },
  reset(){ this.stack=[]; this.idx=-1; this.lastSave=0; clearTimeout(this.debounceTimer); },
  init(){ this.reset(); this.save(); },
};

// ── DOM ─────────────────────────────────────────────────────────────────────
const q=id=>document.getElementById(id);
const ED=q('editor'), LN=q('line-numbers'), EP=q('editor-pane'), ES=q('empty-state'), FB=q('find-bar');
const HB=q('heartbeat'), HBL=q('hb-label');

// ── Utils ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function toast(msg,ms=2200){
  const t=q('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),ms);
}

function fmtDate(iso){
  const d=new Date(iso), diff=Date.now()-d;
  if(diff<60e3) return 'just now';
  if(diff<3600e3) return Math.floor(diff/60e3)+'m ago';
  if(diff<86400e3) return Math.floor(diff/3600e3)+'h ago';
  return d.toLocaleDateString();
}

function showConfirm(title,msg,cb){
  q('modal-title').textContent=title; q('modal-msg').textContent=msg;
  S.confirmCb=cb;
  q('modal-cancel').style.display='';
  const ok=q('modal-ok'); ok.textContent='Delete'; ok.classList.add('btn-danger'); ok.classList.remove('btn-ghost');
  q('modal-overlay').classList.add('show');
}
function showInfo(title,html){
  q('modal-title').textContent=title; q('modal-msg').innerHTML=html;
  S.confirmCb=null;
  q('modal-cancel').style.display='none';
  const ok=q('modal-ok'); ok.textContent='Got it'; ok.classList.remove('btn-danger'); ok.classList.add('btn-ghost');
  q('modal-overlay').classList.add('show');
}
q('modal-ok').addEventListener('click',()=>{ q('modal-overlay').classList.remove('show'); if(S.confirmCb) S.confirmCb(); S.confirmCb=null; });
q('modal-cancel').addEventListener('click',()=>{ q('modal-overlay').classList.remove('show'); S.confirmCb=null; });

// ── Durability heartbeat (signature) ────────────────────────────────────────
function hbWriting(){ HB.classList.remove('failed','pulse'); HB.classList.add('writing'); HBL.textContent='Writing…'; }
function hbSafe(){
  HB.classList.remove('writing','failed');
  HBL.textContent='Safe';
  HB.classList.remove('pulse'); void HB.offsetWidth; HB.classList.add('pulse');
}
function hbFailed(){ HB.classList.remove('writing','pulse'); HB.classList.add('failed'); HBL.textContent='Save failed'; }

// ── Notes list ──────────────────────────────────────────────────────────────
async function loadNotes(){
  try{ S.notes=(await App().ListNotes())||[]; renderList(); }
  catch(e){ toast('Couldn’t load notes'); }
}

function renderList(filter=''){
  const nl=q('notes-list'); nl.innerHTML='';
  const f=filter.toLowerCase();
  const visible=f ? S.notes.filter(n=>(n.title||'').toLowerCase().includes(f)||(n.content||'').toLowerCase().includes(f)) : S.notes;
  q('sb-count').textContent=S.notes.length;

  if(!visible.length){
    nl.innerHTML=`<div class="sb-empty">${f?'No matches':'No notes yet.<br>Press Ctrl+N to start.'}</div>`;
    return;
  }
  visible.forEach(n=>{
    const el=document.createElement('div');
    el.className='ni'+(n.id===S.activeId?' active':'');
    el.dataset.id=n.id;
    el.innerHTML=`
      <div class="ni-info">
        <div class="ni-title">${esc(n.title||'Untitled')}</div>
        <div class="ni-date">${fmtDate(n.updated_at)}</div>
      </div>
      <button class="ni-del" data-id="${n.id}" title="Delete">
        <span class="ic" style="--i:url(assets/icons/trash.svg)"></span>
      </button>`;
    el.addEventListener('click',e=>{ if(!e.target.closest('.ni-del')) openNote(n.id); });
    el.querySelector('.ni-del').addEventListener('click',e=>{ e.stopPropagation(); confirmDelete(n.id,n.title); });
    nl.appendChild(el);
  });
}

// ── Open / create / delete ──────────────────────────────────────────────────
async function openNote(id){
  let n;
  try{ n=await App().GetNote(id); }
  catch(e){ toast('Couldn’t open note'); return; }
  S.activeId=id;
  q('note-title').value=n.title||'';
  ED.value=n.content||'';
  UndoMgr.init();
  updateLineNumbers(); updateStatus(); updateFileTag(n.file_path);
  hbSafe();
  ES.style.display='none';
  EP.classList.remove('show'); void EP.offsetWidth; EP.classList.add('show');
  ED.focus(); requestAnimationFrame(()=>SmoothCaret.update());
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.id)===id));
}

async function newNote(){
  let n;
  try{ n=await App().CreateNote(); }
  catch(e){ toast('Couldn’t create note'); return; }
  S.notes.unshift(n);
  renderList(q('search-inp').value);
  await openNote(n.id);
}

async function confirmDelete(id,title){
  showConfirm('Delete note',`“${title||'Untitled'}” will be permanently deleted.`,async()=>{
    try{ await App().DeleteNote(id); }
    catch(e){ toast('Delete failed'); return; }
    S.notes=S.notes.filter(n=>n.id!==id);
    if(S.activeId===id){
      S.activeId=null;
      q('note-title').value=''; ED.value='';
      updateLineNumbers(); updateStatus(); updateFileTag('');
      EP.classList.remove('show'); ES.style.display='';
    }
    renderList(q('search-inp').value);
    toast('Note deleted');
  });
}

// ── Auto-save → WAL ─────────────────────────────────────────────────────────
function scheduleSave(){ clearTimeout(S.saveTimer); hbWriting(); S.saveTimer=setTimeout(flushSave,900); }

async function flushSave(){
  if(!S.activeId) return;
  const title=q('note-title').value.trim()||'Untitled';
  const content=ED.value;
  try{
    await App().UpdateNote(S.activeId,title,content);
    hbSafe();
    const idx=S.notes.findIndex(n=>n.id===S.activeId);
    if(idx>=0){
      S.notes[idx].title=title; S.notes[idx].content=content;
      S.notes[idx].updated_at=new Date().toISOString();
      const [n]=S.notes.splice(idx,1); S.notes.unshift(n);
    }
    renderList(q('search-inp').value);
  }catch(e){ hbFailed(); }
}

// ── Line numbers ────────────────────────────────────────────────────────────
function updateLineNumbers(){
  const count=(ED.value.match(/\n/g)||[]).length+1;
  let s=''; for(let i=1;i<=count;i++) s+=i+'\n';
  LN.textContent=s; LN.scrollTop=ED.scrollTop;
}

// ── Status bar ──────────────────────────────────────────────────────────────
function updateStatus(){
  const txt=ED.value, pos=ED.selectionStart, before=txt.substring(0,pos);
  const line=before.split('\n').length, col=pos-before.lastIndexOf('\n');
  q('st-pos').textContent=`Ln ${line}, Col ${col}`;
  q('st-words').textContent=`${txt.trim()?txt.trim().split(/\s+/).length:0} words`;
  q('st-chars').textContent=`${txt.length} chars`;
}
function updateFileTag(path){ q('st-file').textContent=path?'↪ '+path.split('/').pop():''; }

// ── Editor events ───────────────────────────────────────────────────────────
ED.addEventListener('input',()=>{ UndoMgr.record(); updateLineNumbers(); updateStatus(); scheduleSave(); });
ED.addEventListener('scroll',()=>{ LN.scrollTop=ED.scrollTop; });
ED.addEventListener('click',updateStatus);
ED.addEventListener('keyup',updateStatus);

// ── Smooth spring caret ───────────────────────────────────────────────────────
// Hides the native caret and glides a custom one to the cursor position with a
// framer-motion-style spring (stiffness 500, damping 30, mass 0.5).
const SmoothCaret = (() => {
  const caret = q('smooth-caret');
  let mirror = null, ok = false;
  const COPY = ['direction','boxSizing','width','height','overflowX','overflowY',
    'borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth','borderStyle',
    'paddingTop','paddingRight','paddingBottom','paddingLeft',
    'fontStyle','fontVariant','fontWeight','fontStretch','fontSize','lineHeight','fontFamily',
    'textAlign','textTransform','textIndent','letterSpacing','wordSpacing','tabSize',
    'whiteSpace','overflowWrap','wordBreak'];

  function ensureMirror(){
    if(mirror) return mirror;
    mirror = document.createElement('div');
    mirror.setAttribute('aria-hidden','true');
    document.body.appendChild(mirror);
    return mirror;
  }
  // caret {top,left} relative to the textarea border box, using a mirror div so
  // wrapping/scrolling match the textarea exactly.
  function coords(cs){
    const m = ensureMirror(), s = m.style;
    COPY.forEach(p => { s[p] = cs[p]; });
    s.position='absolute'; s.top='0'; s.left='-9999px';
    s.visibility='hidden'; s.overflow='hidden'; s.height='auto';
    const pos = ED.selectionEnd;
    m.textContent = ED.value.substring(0, pos);
    const span = document.createElement('span');
    span.textContent = ED.value.substring(pos) || '.';
    m.appendChild(span);
    const top  = span.offsetTop  + (parseInt(cs.borderTopWidth)  || 0);
    const left = span.offsetLeft + (parseInt(cs.borderLeftWidth) || 0);
    m.textContent = '';
    return { top, left };
  }

  const K = 500, C = 30, M = 0.5;                 // spring constants
  let cur = {x:0,y:0}, tgt = {x:0,y:0}, vel = {x:0,y:0}, raf = null, shown = false, blinkT = null;
  function loop(){
    const dt = 1/60; let settled = true;
    for(const a of ['x','y']){
      const f = -K*(cur[a]-tgt[a]) - C*vel[a];
      vel[a] += (f/M)*dt; cur[a] += vel[a]*dt;
      if(Math.abs(vel[a]) > 0.05 || Math.abs(cur[a]-tgt[a]) > 0.05) settled = false;
    }
    if(settled){ cur.x = tgt.x; cur.y = tgt.y; vel.x = vel.y = 0; }
    caret.style.transform = `translate(${cur.x}px,${cur.y}px)`;
    raf = settled ? null : requestAnimationFrame(loop);
  }
  function pulse(){ caret.classList.remove('blink'); caret.style.opacity = '1'; clearTimeout(blinkT); blinkT = setTimeout(() => caret.classList.add('blink'), 530); }

  function update(){
    if(!ok) return;
    try{
      if(document.activeElement !== ED || ED.selectionStart !== ED.selectionEnd){ hide(); return; }
      const cs = getComputedStyle(ED);
      const c  = coords(cs);
      const fs = parseFloat(cs.fontSize), lh = parseFloat(cs.lineHeight) || fs*1.6;
      const h  = Math.round(fs*1.05);
      const er = ED.getBoundingClientRect(), pr = EP.getBoundingClientRect();
      const vx = er.left + c.left - ED.scrollLeft;
      const vy = er.top  + c.top  - ED.scrollTop;
      if(vx < er.left-2 || vx > er.right+2 || vy < er.top-2 || vy > er.bottom+2){ hide(); return; }
      caret.style.height = h + 'px';
      tgt.x = Math.round(vx - pr.left);
      tgt.y = Math.round(vy - pr.top + (lh - h)/2 - fs*0.08);   // nudge up to optical centre
      if(!shown){ cur.x = tgt.x; cur.y = tgt.y; vel.x = vel.y = 0; shown = true; caret.style.display = 'block'; }
      if(!raf) loop();
      pulse();
    }catch(e){ disable(); }
  }
  function hide(){ shown = false; caret.style.display = 'none'; clearTimeout(blinkT); if(raf){ cancelAnimationFrame(raf); raf = null; } }
  function disable(){ ok = false; hide(); ED.style.caretColor = ''; }   // fall back to native caret

  function init(){
    if(!caret) return;
    ok = true;
    ED.style.caretColor = 'transparent';
    ['input','keyup','click','focus','scroll'].forEach(ev => ED.addEventListener(ev, update));
    ED.addEventListener('blur', hide);
    document.addEventListener('selectionchange', () => { if(document.activeElement === ED) update(); });
    window.addEventListener('resize', update);
  }
  return { init, update, hide };
})();
SmoothCaret.init();
ED.addEventListener('keydown',e=>{
  if(e.ctrlKey && (e.key==='z'||e.key==='Z') && !e.shiftKey){ e.preventDefault(); if(UndoMgr.undo()){ updateLineNumbers(); updateStatus(); scheduleSave(); } return; }
  if((e.ctrlKey&&e.shiftKey&&(e.key==='z'||e.key==='Z'))||(e.ctrlKey&&(e.key==='y'||e.key==='Y'))){ e.preventDefault(); if(UndoMgr.redo()){ updateLineNumbers(); updateStatus(); scheduleSave(); } return; }
  if(e.key==='Tab'){
    e.preventDefault();
    const s=ED.selectionStart, en=ED.selectionEnd;
    ED.value=ED.value.substring(0,s)+'    '+ED.value.substring(en);
    ED.selectionStart=ED.selectionEnd=s+4;
    UndoMgr.record(); updateLineNumbers(); updateStatus(); scheduleSave(); return;
  }
  if(e.ctrlKey && e.key==='s'){ e.preventDefault(); clearTimeout(S.saveTimer); flushSave().then(saveToFile); return; }
  if(e.ctrlKey && e.key==='f'){ e.preventDefault(); openFind(); }
});

// ── Find & replace ──────────────────────────────────────────────────────────
function openFind(){ FB.classList.add('show'); q('fi-query').focus(); q('fi-query').select(); doFind(); }
function closeFind(){ FB.classList.remove('show'); S.findMatches=[]; q('fi-count').textContent='0/0'; ED.focus(); }
function doFind(){
  const needle=q('fi-query').value; S.findMatches=[]; S.findIdx=0;
  if(!needle){ q('fi-count').textContent='0/0'; return; }
  const hay=ED.value.toLowerCase(), ndl=needle.toLowerCase();
  let i=0; while((i=hay.indexOf(ndl,i))!==-1){ S.findMatches.push(i); i++; }
  updateFindCount(); if(S.findMatches.length) highlightMatch();
}
function updateFindCount(){ const t=S.findMatches.length; q('fi-count').textContent=t?`${S.findIdx+1}/${t}`:'0/0'; }
function highlightMatch(){
  if(!S.findMatches.length) return;
  const pos=S.findMatches[S.findIdx], len=q('fi-query').value.length;
  ED.focus(); ED.setSelectionRange(pos,pos+len);
  const lh=parseFloat(getComputedStyle(ED).lineHeight)||22;
  const line=ED.value.substring(0,pos).split('\n').length;
  ED.scrollTop=Math.max(0,(line-4)*lh); LN.scrollTop=ED.scrollTop;
}
function findNext(){ if(!S.findMatches.length) return; S.findIdx=(S.findIdx+1)%S.findMatches.length; updateFindCount(); highlightMatch(); }
function findPrev(){ if(!S.findMatches.length) return; S.findIdx=(S.findIdx-1+S.findMatches.length)%S.findMatches.length; updateFindCount(); highlightMatch(); }
function replaceOne(){
  if(!S.findMatches.length) return;
  const pos=S.findMatches[S.findIdx], needle=q('fi-query').value, rep=q('fi-replace').value;
  ED.value=ED.value.substring(0,pos)+rep+ED.value.substring(pos+needle.length);
  UndoMgr.record(); updateLineNumbers(); updateStatus(); scheduleSave(); doFind();
}
function replaceAll(){
  const needle=q('fi-query').value; if(!needle) return;
  const rep=q('fi-replace').value, cnt=S.findMatches.length;
  ED.value=ED.value.split(new RegExp(needle.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi')).join(rep);
  UndoMgr.record(); updateLineNumbers(); updateStatus(); scheduleSave(); doFind();
  toast(`Replaced ${cnt} occurrence${cnt!==1?'s':''}`);
}
q('fi-query').addEventListener('input',doFind);
q('fi-query').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.shiftKey?findPrev():findNext(); } if(e.key==='Escape') closeFind(); });
q('fi-next').addEventListener('click',findNext);
q('fi-prev').addEventListener('click',findPrev);
q('fi-rep-one').addEventListener('click',replaceOne);
q('fi-rep-all').addEventListener('click',replaceAll);
q('fi-close').addEventListener('click',closeFind);

// ── File import / export ────────────────────────────────────────────────────
async function saveToFile(){
  if(!S.activeId) return;
  let path;
  try{ path=await App().SaveToFile(S.activeId); }
  catch(e){ toast('Export failed'); return; }
  if(path){
    const idx=S.notes.findIndex(n=>n.id===S.activeId);
    if(idx>=0) S.notes[idx].file_path=path;
    updateFileTag(path); toast('Exported → '+path.split('/').pop());
  }
}
async function openFile(){
  let n;
  try{ n=await App().OpenFile(); }
  catch(e){ toast('Open failed'); return; }
  if(n){
    S.notes.unshift(n); renderList(q('search-inp').value);
    await openNote(n.id); toast('Opened '+n.title);
  }
}

// ── Font, wrap, theme ───────────────────────────────────────────────────────
function setFontSize(sz){
  S.fontSize=Math.max(10,Math.min(36,sz));
  document.documentElement.style.setProperty('--fs',S.fontSize+'px');
  updateLineNumbers(); SmoothCaret.update(); App().SetSetting('fontSize',String(S.fontSize));
}
function toggleWrap(){
  S.wordWrap=!S.wordWrap;
  ED.style.whiteSpace=S.wordWrap?'pre-wrap':'pre';
  ED.style.overflowX=S.wordWrap?'hidden':'auto';
  SmoothCaret.update();
  App().SetSetting('wordWrap',S.wordWrap?'1':'0');
}
function setTheme(t){ S.theme=t; document.body.dataset.theme=t; App().SetSetting('theme',t); }
function syncThemeBtn(){ const b=q('theme-btn'); if(b) b.classList.toggle('is-dark', S.theme==='dark'); }

// Theme switch with a View-Transitions circular reveal (top-left origin, blurred).
function ensureThemeTransitionCSS(){
  if(document.getElementById('theme-vt')) return;
  const st=document.createElement('style'); st.id='theme-vt';
  st.textContent=`
::view-transition-group(root){animation-duration:.9s;animation-timing-function:cubic-bezier(.16,1,.3,1)}
::view-transition-new(root){animation-name:gp-theme-reveal}
::view-transition-old(root){animation:none;z-index:-1}
@keyframes gp-theme-reveal{
  from{clip-path:circle(0% at 0% 0%);filter:blur(8px)}
  50%{filter:blur(4px)}
  to{clip-path:circle(150% at 0% 0%);filter:blur(0)}
}`;
  document.head.appendChild(st);
}
function toggleThemeAnimated(){
  const next = S.theme==='dark' ? 'light' : 'dark';
  ensureThemeTransitionCSS();
  const swap = () => { setTheme(next); syncThemeBtn(); };
  if(document.startViewTransition) document.startViewTransition(swap);
  else swap();
}

function setSidebar(collapsed,persist=true){
  S.sbCollapsed=collapsed;
  q('sidebar').classList.toggle('collapsed',collapsed);
  q('sb-toggle').classList.toggle('collapsed',collapsed);
  if(persist) App().SetSetting('sidebar',collapsed?'1':'0');
}
function toggleSidebar(){ setSidebar(!S.sbCollapsed); }

// ── Buttons ─────────────────────────────────────────────────────────────────
q('btn-new').addEventListener('click',newNote);
q('btn-new-empty').addEventListener('click',newNote);
q('sb-toggle').addEventListener('click',toggleSidebar);
q('theme-btn').addEventListener('click',toggleThemeAnimated);
q('note-title').addEventListener('input',scheduleSave);

// Custom window controls (frameless window)
q('win-min').addEventListener('click',()=>window.runtime.WindowMinimise());
q('win-max').addEventListener('click',()=>window.runtime.WindowToggleMaximise());
q('win-close').addEventListener('click',()=>window.runtime.Quit());
q('header').addEventListener('dblclick',e=>{ if(e.target.id==='header') window.runtime.WindowToggleMaximise(); });
q('search-inp').addEventListener('input',e=>renderList(e.target.value));

// ── Menu bar ────────────────────────────────────────────────────────────────
const MENU=q('menubar');
function closeMenus(){ MENU.querySelectorAll('.menu.open').forEach(m=>m.classList.remove('open')); }
MENU.querySelectorAll('.menu').forEach(menu=>{
  const btn=menu.querySelector('.menu-btn');
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    const wasOpen=menu.classList.contains('open');
    closeMenus(); if(!wasOpen) menu.classList.add('open');
  });
  // Slide between menus when one is already open (desktop menu behaviour).
  btn.addEventListener('mouseenter',()=>{ if(MENU.querySelector('.menu.open')){ closeMenus(); menu.classList.add('open'); } });
});

const ABOUT_HTML='<strong style="color:var(--text-bright)">Crash-proof desktop notepad.</strong><br>'+
  'Every keystroke is written to SQLite (WAL) before you ever reach for Save — the <em>Safe</em> dot in the status bar pulses on each commit.<br><br>'+
  '<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Go · Wails v2 · WebKitGTK · SQLite</span>';
const SHORTCUTS_HTML=[
  ['Ctrl+N','New note'],['Ctrl+O','Open file'],['Ctrl+S','Export to file'],
  ['Ctrl+F','Find &amp; replace'],['Ctrl+Z','Undo'],['Ctrl+Shift+Z','Redo'],
  ['Tab','Insert 4 spaces'],['Esc','Close find / dialog'],
].map(([k,v])=>`<div style="display:flex;justify-content:space-between;gap:24px;padding:3px 0"><span>${v}</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">${k}</span></div>`).join('');

const MENU_ACTIONS={
  new:newNote,
  open:openFile,
  export:()=>{ clearTimeout(S.saveTimer); flushSave().then(saveToFile); },
  delete:()=>{ if(!S.activeId){ toast('No note selected'); return; } const n=S.notes.find(x=>x.id===S.activeId); confirmDelete(S.activeId,n?.title); },
  undo:()=>{ if(UndoMgr.undo()){ updateLineNumbers(); updateStatus(); scheduleSave(); } },
  redo:()=>{ if(UndoMgr.redo()){ updateLineNumbers(); updateStatus(); scheduleSave(); } },
  find:openFind,
  sidebar:toggleSidebar,
  wrap:toggleWrap,
  finc:()=>setFontSize(S.fontSize+1),
  fdec:()=>setFontSize(S.fontSize-1),
  theme:toggleThemeAnimated,
  shortcuts:()=>showInfo('Keyboard shortcuts',SHORTCUTS_HTML),
  about:()=>showInfo('GoPad',ABOUT_HTML),
};
MENU.querySelectorAll('.menu-item').forEach(item=>{
  item.addEventListener('click',e=>{ e.stopPropagation(); const act=item.dataset.act; closeMenus(); MENU_ACTIONS[act]?.(); });
});
document.addEventListener('click',closeMenus);

document.addEventListener('keydown',e=>{
  if(e.ctrlKey && e.key==='n'){ e.preventDefault(); newNote(); }
  if(e.ctrlKey && e.key==='o'){ e.preventDefault(); openFile(); }
  if(e.ctrlKey && e.key==='b'){ e.preventDefault(); toggleSidebar(); }
  if(e.key==='Escape'){ closeMenus(); if(FB.classList.contains('show')) closeFind(); q('modal-overlay').classList.remove('show'); }
});

// ── Init (wait for Wails bindings, then hydrate) ────────────────────────────
async function init(){
  try{
    const [theme,font,wrap,sidebar]=await Promise.all([
      App().GetSetting('theme'), App().GetSetting('fontSize'),
      App().GetSetting('wordWrap'), App().GetSetting('sidebar'),
    ]);
    if(theme) setTheme(theme);
    syncThemeBtn();
    if(font) setFontSize(parseInt(font)||14);
    if(wrap) S.wordWrap=wrap!=='0';
    if(sidebar==='1') setSidebar(true,false);
  }catch(e){ /* first run, defaults are fine */ }

  ED.style.whiteSpace=S.wordWrap?'pre-wrap':'pre';
  ED.style.overflowX=S.wordWrap?'hidden':'auto';

  await loadNotes();
  if(S.notes.length>0) await openNote(S.notes[0].id);
}

// window.go is injected by the Wails runtime; wait for it before hydrating.
(function waitForBindings(){
  if(window.go && window.go.main && window.go.main.App) init();
  else setTimeout(waitForBindings,30);
})();
</script>
</body>
